name: "🐛 Bug report"
description: "Something in the app doesn't work as expected."
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: "Thanks for the report! Please fill in as much as you can."
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click Finish on a mock exam, the timer keeps running…"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to Practice
        2. Start a mock exam
        3. …
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
        - Other (note below)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: "Shown in the footer / Settings → About."
      placeholder: "1.0.0"
  - type: textarea
    id: console
    attributes:
      label: Console errors (optional)
      description: Open DevTools (F12) → Console and paste any red errors.
      render: shell
