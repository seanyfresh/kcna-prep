name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JavaScript syntax check (node --check)
        run: |
          set -e
          fail=0
          while IFS= read -r -d '' f; do
            echo "checking $f"
            node --check "$f" || fail=1
          done < <(find assets data service-worker.js -name '*.js' -print0 2>/dev/null)
          exit $fail

      - name: HTML lint
        run: npx --yes htmlhint "index.html"

      - name: Validate JSON config (manifest, vercel)
        run: |
          set -e
          for f in manifest.webmanifest vercel.json .vscode/extensions.json; do
            if [ -f "$f" ]; then
              echo "validating $f"
              node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"
            fi
          done

  links:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link checker
        uses: lycheeverse/lychee-action@v2
        with:
          fail: false
          args: >-
            --no-progress
            --accept 200,206,429
            --exclude-path node_modules
            --exclude 'localhost'
            './**/*.md'
