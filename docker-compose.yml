# Run KCNA Prep locally with one command:
#   docker compose up -d   →  http://localhost:4178
#   docker compose down
services:
  kcna-prep:
    build: .
    image: kcna-prep:latest
    container_name: kcna-prep
    ports:
      - "4178:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
