# Hardened static-file server for KCNA Prep.
# Used by the Docker image (see Dockerfile). Security headers here mirror the
# CSP in index.html and the Netlify/Vercel configs.

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Don't leak the nginx version.
    server_tokens off;

    # ---- Compression ----
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/manifest+json;

    # ---- Security headers (apply to every response) ----
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; manifest-src 'self'; worker-src 'self'; form-action 'none'; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # Enable only when served over HTTPS (e.g. behind a TLS-terminating proxy):
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- Caching ----
    # The service worker must always be revalidated so updates ship promptly.
    location = /service-worker.js {
        add_header Cache-Control "no-cache" always;
    }
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }
    # Long-cache static content (it's versioned by the SW cache name).
    location ~* \.(?:js|css|svg|png|ico|webmanifest|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for orchestrators.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
